<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📘 VOCA QUIZ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">

    <!-- 초기 메뉴 화면 -->
    <section id="home-screen" class="screen active">
      <h1>📘 VOCA QUIZ</h1>
      <p class="subtitle">영단어 학습 프로그램</p>

      <div class="menu-card">
        <button id="quiz-menu-btn" class="main-btn">퀴즈 풀기</button>
        <button id="wrong-menu-btn" class="sub-btn">오답노트</button>
        <button id="wordbook-menu-btn" class="sub-btn">단어장</button>
      </div>
    </section>

    <!-- 퀴즈 설정 화면 -->
    <section id="quiz-setting-screen" class="screen">
      <div class="top-row">
        <button class="back-btn">← 홈</button>
        <h2>퀴즈 설정</h2>
      </div>

      <div class="menu-card">
        <label>문제 수 선택</label>
        <select id="quiz-count">
          <option value="10">10문제</option>
          <option value="50">50문제</option>
          <option value="100">100문제</option>
          <option value="all">전체 문제</option>
        </select>

        <label>퀴즈 모드</label>
        <select id="quiz-mode">
          <option value="engToKor">영어 → 뜻</option>
          <option value="korToEng">뜻 → 영어</option>
        </select>

        <button id="start-btn" class="main-btn">시작하기</button>
      </div>
    </section>

    <!-- 퀴즈 화면 -->
    <section id="quiz-screen" class="screen">
      <div class="top-row">
        <button class="back-btn">← 홈</button>
        <div id="score" class="score-badge">🎯 점수 : 0 / 0</div>
      </div>

      <div class="question-card">
        <span id="progress" class="question-label">QUESTION</span>
        <h2 id="question">문제</h2>
      </div>

      <div class="choice-list">
        <button class="choice-btn"></button>
        <button class="choice-btn"></button>
        <button class="choice-btn"></button>
        <button class="choice-btn"></button>
        <button class="choice-btn"></button>
      </div>

      <div id="result" class="result-box">결과</div>
      <button id="next-btn" class="main-btn">다음 문제</button>
    </section>
    
    <!-- 퀴즈 종료 화면 -->
  <section id="finish-screen" class="screen">
  <h1>🎉 퀴즈 종료!</h1>

  <div class="finish-card">
    <p id="final-score">최종 점수 : 0 / 0</p>
    <p id="final-accuracy">정답률 : 0%</p>

    <button id="retry-btn" class="main-btn">다시 풀기</button>
    <button id="finish-home-btn" class="sub-btn">홈으로 가기</button>
  </div>
</section>

    <!-- 오답노트 화면 -->
    <section id="wrong-screen" class="screen">
      <div class="top-row">
        <button class="back-btn">← 홈</button>
        <h2>📌 오답노트</h2>
      </div>

      <div class="menu-card">
        <button id="review-wrong-btn" class="main-btn">오답 다시 풀기</button>
        <button id="clear-wrong-btn" class="danger-btn">오답노트 비우기</button>
        <ul id="wrong-list"></ul>
      </div>
    </section>

    <!-- 단어장 화면 -->
    <section id="wordbook-screen" class="screen">
      <div class="top-row">
        <button class="back-btn">← 홈</button>
        <h2>🔍 단어장</h2>
        <p id="word-count" class="word-count">총 0개 단어</p>
      </div>

      <input id="search-input" type="text" placeholder="단어 또는 뜻 검색" />
      <div id="word-list"></div>
    </section>

  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
