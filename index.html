<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📘 VOCA QUIZ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div>
        <h1>📘 VOCA QUIZ</h1>
        <p>영단어 학습 프로그램</p>
      </div>
      <div id="score" class="score-badge">🎯 점수 : 0 / 0</div>
    </header>

    <section class="control-panel">
      <select id="quiz-count">
        <option value="10">10문제</option>
        <option value="20">20문제</option>
        <option value="all">전체 문제</option>
      </select>

      <select id="quiz-mode">
        <option value="engToKor">영어 → 뜻</option>
        <option value="korToEng">뜻 → 영어</option>
      </select>

      <button id="start-btn">새로 시작</button>
    </section>

    <section class="question-card">
      <span id="progress" class="question-label">QUESTION</span>
      <h2 id="question">문제</h2>
    </section>

    <section class="choice-list">
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
    </section>

    <section class="bottom-panel">
      <div id="result" class="result-box">결과</div>
      <button id="next-btn">다음 문제</button>
    </section>

    <section class="extra-panel">
      <h3>📌 오답노트</h3>
      <div class="extra-buttons">
        <button id="review-wrong-btn">오답 다시 풀기</button>
        <button id="clear-wrong-btn">오답노트 비우기</button>
      </div>
      <ul id="wrong-list"></ul>
    </section>

    <section class="extra-panel">
      <h3>🔍 단어장 검색</h3>
      <input id="search-input" type="text" placeholder="단어 또는 뜻 검색" />
      <div id="word-list"></div>
    </section>
  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
