<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📘 VOCA QUIZ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div>
        <h1>📘 VOCA QUIZ</h1>
        <p>영단어 학습 프로그램</p>
      </div>
      <div id="score" class="score-badge">🎯 점수 : 0 / 0</div>
    </header>

    <section class="question-card">
      <span class="question-label">QUESTION</span>
      <h2 id="question">문제</h2>
    </section>

    <section class="choice-list">
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
    </section>

    <section class="bottom-panel">
      <div id="result" class="result-box">결과</div>
      <button id="next-btn">다음 문제</button>
    </section>
  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
